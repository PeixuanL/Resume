<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新橙科技 AI 产品经理业务一面准备</title>
  <style>
:root {
  --bg: #f4f7f6;
  --surface: #ffffff;
  --surface-2: #e8f1ef;
  --ink: #161616;
  --muted: #666b6a;
  --line: #cbd8d5;
  --accent: #226b62;
  --accent-2: #a25c1d;
  --blue: #315f96;
  --yellow: #e9bf4f;
  --danger: #9f3a2f;
  --shadow: 0 18px 50px rgba(20, 45, 42, 0.08);
  font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  color: var(--ink);
  background: var(--bg);
  font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
  letter-spacing: 0;
}

button,
select,
textarea,
input {
  font: inherit;
}

button {
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink);
  padding: 8px 11px;
  border-radius: 7px;
  cursor: pointer;
}

button:hover {
  border-color: var(--accent);
}

.primary-btn {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: auto;
  padding: 18px 14px;
  border-right: 1px solid var(--line);
  background: #e2ebe8;
  color: var(--ink);
}

.brand-panel h1 {
  margin: 5px 0 3px;
  font-size: 24px;
  line-height: 1.08;
  letter-spacing: 0;
}

.brand-panel p {
  margin: 0;
  color: var(--muted);
}

.eyebrow {
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--accent-2);
  font-weight: 800;
}

.control-panel,
.quick-panel,
.question-nav-panel {
  margin-top: 12px;
  padding: 11px;
  background: rgba(255, 255, 255, .55);
  border: 1px solid var(--line);
  border-radius: 8px;
}

.control-panel label {
  display: block;
  font-weight: 800;
  margin-bottom: 8px;
  color: var(--ink);
}

.control-panel button,
.quick-panel button {
  width: 100%;
  margin-top: 8px;
}

.segmented {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  margin: 0;
}

.segmented button {
  margin: 0;
}

.segmented button.active,
.view-nav button.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}

.view-nav {
  display: flex;
  flex-wrap: nowrap;
  gap: 3px;
  justify-self: center;
  min-width: 0;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface-2);
  overflow-x: auto;
}

.view-nav button {
  text-align: center;
  min-height: 32px;
  padding: 6px 10px;
  border-color: transparent;
  border-radius: 999px;
  background: transparent;
  font-size: 13px;
  white-space: nowrap;
}

.question-nav-panel {
  display: grid;
  gap: 10px;
}

.sidebar-question-list {
  display: grid;
  gap: 6px;
  max-height: calc(100vh - 275px);
  min-height: 230px;
  overflow: auto;
  padding-right: 3px;
}

.sidebar-question-item {
  min-height: 58px;
  width: 100%;
  text-align: left;
  background: rgba(255, 255, 255, .78);
  padding: 8px 9px;
}

.sidebar-question-item.active {
  border-color: var(--accent);
  box-shadow: inset 0 0 0 2px rgba(47, 125, 109, .18);
  background: #fff;
}

.sidebar-question-empty {
  padding: 10px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  color: var(--muted);
  font-size: 13px;
}

.panel-title {
  font-weight: 900;
  font-size: 14px;
  margin-bottom: 8px;
}

.quick-panel p {
  margin: 5px 0 10px;
  font-size: 13px;
  color: var(--muted);
}

.main-stage {
  padding: 18px clamp(18px, 3vw, 36px) 48px;
  min-width: 0;
}

.topbar {
  display: grid;
  grid-template-columns: minmax(150px, 0.75fr) auto minmax(250px, 1fr);
  gap: 10px;
  align-items: center;
  min-width: 0;
}

.topbar h2 {
  margin: 2px 0 0;
  font-size: clamp(24px, 2.7vw, 36px);
  line-height: 1.05;
  letter-spacing: 0;
}

.top-actions {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  justify-content: flex-end;
  min-width: 0;
}

.top-actions button {
  min-height: 32px;
  padding: 6px 9px;
  font-size: 13px;
  white-space: nowrap;
}

.top-heading {
  min-width: 0;
}

.utility-cluster {
  display: flex;
  flex-wrap: nowrap;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.utility-cluster .segmented {
  flex: 0 0 118px;
  gap: 3px;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface-2);
}

.utility-cluster .segmented button {
  min-height: 28px;
  padding: 5px 8px;
  border-color: transparent;
  border-radius: 999px;
  background: transparent;
  font-size: 12px;
}

.coach-strip {
  margin: 12px 0 14px;
  border: 1px solid var(--line);
  background: var(--surface-2);
  padding: 10px 12px;
  border-radius: 8px;
  line-height: 1.45;
  font-size: 13px;
  color: var(--muted);
}

.coach-strip strong {
  color: var(--ink);
}

.view-panel {
  display: none;
}

.view-panel.active {
  display: block;
}

.practice-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 340px;
  gap: 14px;
  align-items: start;
}

.question-panel,
.builder-panel,
.focus-list,
.framework-list,
.phrase-bank,
.source-strip,
.company-grid,
.map-list {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.question-panel {
  padding: 20px;
  min-height: 560px;
}

.builder-panel {
  padding: 14px;
  position: sticky;
  top: 16px;
  display: grid;
  gap: 6px;
}

.question-meta,
.timer-row,
.builder-actions,
.shadow-head {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.pill {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 3px 9px;
  border-radius: 999px;
  background: #dfeee9;
  color: #17483d;
  font-size: 12px;
  font-weight: 800;
}

.pill.muted {
  background: #f4e6d2;
  color: #68411f;
}

.question-panel h3 {
  font-size: clamp(24px, 3vw, 38px);
  line-height: 1.12;
  margin: 14px 0 8px;
  letter-spacing: 0;
}

.question-intent {
  color: var(--muted);
  margin: 0 0 12px;
  line-height: 1.5;
}

.timer-row {
  margin: 12px 0 14px;
}

.timer-display {
  margin-left: auto;
  font-variant-numeric: tabular-nums;
  font-size: 24px;
  font-weight: 900;
  min-width: 82px;
  text-align: right;
  color: var(--blue);
}

.answer-tabs {
  display: flex;
  gap: 7px;
  border-bottom: 1px solid var(--line);
  margin-top: 10px;
  overflow-x: auto;
}

.tab {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
  border-bottom: 0;
  background: transparent;
  white-space: nowrap;
}

.tab.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}

.tab-content {
  min-height: 190px;
  padding: 14px 0;
  line-height: 1.68;
  white-space: pre-wrap;
  font-size: 16px;
}

.tab-content ul {
  margin: 0;
  padding-left: 22px;
}

.tab-content li {
  margin: 9px 0;
}

.intent-board {
  display: grid;
  gap: 9px;
  white-space: normal;
}

.intent-board-head {
  display: grid;
  gap: 3px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(135deg, #f8faf9 0%, #eef5f2 100%);
}

.intent-board-head span {
  color: var(--accent-2);
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.intent-board-head strong {
  color: var(--ink);
  font-size: 17px;
  line-height: 1.25;
}

.intent-board-head p {
  margin: 0;
  color: var(--muted);
  line-height: 1.5;
}

.intent-rubric-list {
  display: grid;
  gap: 8px;
}

.intent-rubric-card {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) minmax(150px, .55fr);
  gap: 10px;
  align-items: center;
  padding: 10px;
  border: 1px solid var(--line);
  border-left: 5px solid var(--accent);
  border-radius: 8px;
  background: #f8faf9;
}

.intent-index {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border-radius: 999px;
  background: var(--ink);
  color: var(--surface);
  font-size: 12px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}

.intent-card-title {
  display: block;
  margin-bottom: 4px;
  color: var(--accent-2);
  font-size: 12px;
}

.intent-rubric-copy p {
  margin: 0;
  color: var(--ink);
  line-height: 1.58;
}

.intent-signal {
  display: grid;
  gap: 4px;
  padding: 8px 9px;
  border: 1px solid rgba(203, 216, 213, .85);
  border-radius: 8px;
  background: #fff;
}

.intent-signal strong {
  color: var(--accent-2);
  font-size: 12px;
}

.intent-signal span {
  color: var(--muted);
  line-height: 1.45;
  font-size: 13px;
}

.intent-cue {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 9px 10px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  background: #fffaf3;
  color: var(--muted);
}

.intent-cue strong {
  flex: 0 0 auto;
  color: var(--ink);
}

.intent-hook-steps {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 3px 10px;
  border-radius: 999px;
  background: #fff;
  border: 1px solid rgba(203, 216, 213, .85);
  color: var(--ink);
  line-height: 1.45;
  font-weight: 800;
}

.followup-list {
  display: grid;
  gap: 10px;
  white-space: normal;
}

.followup-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f8faf9;
  overflow: hidden;
}

.followup-card summary {
  cursor: pointer;
  padding: 12px 14px;
  font-weight: 900;
  list-style: none;
}

.followup-card summary::-webkit-details-marker {
  display: none;
}

.followup-card summary::after {
  content: "+";
  float: right;
  color: var(--accent-2);
}

.followup-card[open] summary::after {
  content: "-";
}

.followup-body {
  display: grid;
  gap: 10px;
  padding: 0 14px 14px;
}

.followup-body div {
  border-left: 5px solid var(--accent);
  background: #fff;
  border-radius: 0 7px 7px 0;
  padding: 10px 12px;
}

.followup-body strong {
  display: block;
  margin-bottom: 4px;
  color: var(--accent-2);
  font-size: 12px;
}

.followup-body p {
  margin: 0;
  color: var(--ink);
  line-height: 1.62;
}

.shadow-box {
  border-top: 1px solid var(--line);
  padding-top: 16px;
  margin-top: 8px;
}

.shadow-head {
  justify-content: space-between;
}

#shadowLines {
  padding-left: 24px;
  color: var(--muted);
  line-height: 1.62;
}

#shadowLines li {
  margin: 7px 0;
}

.builder-panel label {
  font-weight: 800;
  font-size: 13px;
  margin-top: 6px;
}

textarea,
input,
select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 9px;
  color: var(--ink);
  resize: vertical;
}

textarea:focus,
input:focus,
select:focus {
  outline: 2px solid rgba(47, 125, 109, .25);
  border-color: var(--accent);
}

.save-status {
  margin-top: 10px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 12px;
}

.section-head h3 {
  margin: 0;
  font-size: 22px;
}

.section-head p {
  margin: 4px 0 0;
  color: var(--muted);
}

.section-head input {
  max-width: 360px;
}

.question-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.list-item {
  text-align: left;
  padding: 12px;
  min-height: 92px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
}

.list-item.active {
  border-color: var(--accent);
  box-shadow: inset 0 0 0 2px rgba(47, 125, 109, .18);
}

.item-title {
  display: block;
  font-weight: 800;
  line-height: 1.25;
}

.item-meta {
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-size: 12px;
}

#reviewView,
#companyView,
#mapView {
  display: none;
  gap: 18px;
}

#reviewView.active,
#companyView.active,
#mapView.active {
  display: grid;
}

#reviewView > .section-head,
#companyView > .section-head,
#mapView > .section-head {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  padding: 22px;
  align-items: end;
}

#reviewView > .section-head h3,
#companyView > .section-head h3,
#mapView > .section-head h3 {
  margin: 4px 0 6px;
  font-size: clamp(30px, 4vw, 48px);
  line-height: 1.08;
  letter-spacing: 0;
}

.focus-list,
.framework-list,
.phrase-bank,
.source-strip,
.map-list {
  padding: 18px;
  display: grid;
  gap: 10px;
  box-shadow: none;
}

.company-grid {
  padding: 0;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  background: transparent;
  border: 0;
  box-shadow: none;
}

.review-item,
.framework-item,
.phrase-group,
.source-item,
.company-item,
.map-group {
  border: 1px solid rgba(216, 210, 197, .75);
  border-radius: 8px;
  background: #fff;
  padding: 12px;
  line-height: 1.6;
}

.review-item {
  border-left: 5px solid var(--accent);
}

.source-item {
  border-left: 5px solid var(--accent-2);
  background: #fffaf3;
}

.review-item strong,
.framework-item strong,
.company-item strong,
.map-group strong,
.phrase-group strong {
  display: block;
  margin-bottom: 7px;
}

.review-item p,
.framework-item p,
.company-item p,
.map-group p,
.source-item p {
  margin: 5px 0 0;
  color: var(--muted);
}

.phrase-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.phrase-chip {
  padding: 6px 9px;
  font-size: 12px;
  border-radius: 7px;
  background: #f7faf9;
  color: var(--ink);
}

.company-item {
  display: grid;
  gap: 7px;
}

.company-item p {
  margin: 0;
}

.map-group .question-list {
  margin-top: 10px;
}

dialog {
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  max-width: 680px;
  width: min(92vw, 680px);
}

.dialog-form {
  display: grid;
  gap: 12px;
}

.dialog-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 12px;
}

@media (max-width: 1040px) {
  .app-shell {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
    height: auto;
  }

  .practice-layout {
    grid-template-columns: 1fr;
  }

  .builder-panel {
    position: static;
  }

  .topbar {
    grid-template-columns: 1fr;
  }

  .view-nav,
  .utility-cluster {
    justify-self: stretch;
  }

  .utility-cluster {
    justify-content: space-between;
  }

  .intent-rubric-card {
    grid-template-columns: 1fr;
    align-items: start;
  }
}

@media (max-width: 720px) {
  .main-stage {
    padding: 18px 14px 48px;
  }

  .coach-strip,
  .question-list,
  .company-grid {
    grid-template-columns: 1fr;
  }

  .topbar,
  .section-head,
  #reviewView > .section-head,
  #companyView > .section-head,
  #mapView > .section-head {
    display: grid;
  }

  .section-head input {
    max-width: none;
  }

  .timer-display {
    width: 100%;
    text-align: left;
    margin-left: 0;
  }

  .intent-cue {
    display: grid;
  }
}

</style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Interview prep controls">
      <section class="brand-panel">
        <div class="eyebrow" id="roundLabel">Reusable draft</div>
        <h1 id="companyName">Interview Prep</h1>
        <p id="roleName">Bilingual practice pack</p>
      </section>

      <section class="control-panel" id="modeFilterPanel">
        <label class="panel-title" for="modeSelect" id="modeLabel">题目筛选</label>
        <select id="modeSelect" aria-label="Question filters"></select>
        <button class="primary-btn" id="randomBtn" type="button">随机抽题</button>
      </section>

      <section class="question-nav-panel" id="questionNavPanel">
        <div class="panel-title" id="questionListTitle">题库</div>
        <input id="sidebarQuestionSearch" type="search" placeholder="搜索问题、能力、关键词...">
        <div id="sidebarQuestionList" class="sidebar-question-list"></div>
      </section>

      <section class="quick-panel" id="quickPanel">
        <div class="panel-title" id="coreLineTitle">今天只背这句</div>
        <p id="coreLine"></p>
        <button id="speakCoreBtn" type="button">朗读</button>
      </section>
    </aside>

    <main class="main-stage">
      <header class="topbar">
        <div class="top-heading">
          <div class="eyebrow" id="pageKicker">Draft</div>
          <h2 id="pageTitle">Practice</h2>
        </div>
        <nav class="view-nav" id="viewNav" aria-label="Primary views"></nav>
        <div class="utility-cluster">
          <div class="segmented" id="languageSwitch" role="group" aria-label="Language">
            <button type="button" data-lang="zh" class="active">中文</button>
            <button type="button" data-lang="en">English</button>
          </div>
          <div class="top-actions">
            <button id="exportBtn" type="button">导出</button>
            <button id="importBtn" type="button">导入</button>
            <button id="resetBtn" type="button">重置</button>
          </div>
        </div>
      </header>

      <section class="coach-strip" id="boundaryText"></section>

      <section class="view-panel active" id="practiceView" data-view="practice">
        <div class="practice-layout">
          <article class="question-panel">
            <div class="question-meta">
              <span id="categoryPill" class="pill">Opening</span>
              <span id="difficultyPill" class="pill muted">Core</span>
            </div>
            <h3 id="questionText"></h3>
            <p id="questionIntent" class="question-intent"></p>

            <div class="timer-row">
              <button id="timer60" type="button">60s</button>
              <button id="timer90" type="button">90s</button>
              <button id="timer120" type="button">120s</button>
              <button id="stopTimer" type="button">Stop</button>
              <div id="timerDisplay" class="timer-display">00:00</div>
            </div>

            <div class="answer-tabs" id="answerTabs" role="tablist">
              <button class="tab active" data-tab="intent" type="button">意图</button>
              <button class="tab" data-tab="simple" type="button">简短</button>
              <button class="tab" data-tab="full" type="button">完整</button>
              <button class="tab" data-tab="followups" type="button">追问</button>
            </div>

            <div id="tabContent" class="tab-content"></div>
            <div class="shadow-box">
              <div class="shadow-head">
                <strong id="shadowTitle">跟读训练</strong>
                <button id="speakAnswerBtn" type="button">朗读当前答案</button>
              </div>
              <ol id="shadowLines"></ol>
            </div>
          </article>

          <aside class="builder-panel">
            <div class="panel-title" id="builderTitle">回答搭建器</div>
            <label for="editableSimple" id="simpleLabel">简短回答</label>
            <textarea id="editableSimple" rows="5"></textarea>
            <label for="editableFull" id="fullLabel">完整回答</label>
            <textarea id="editableFull" rows="10"></textarea>

          simple: `我可以先用一个场景来讲这个项目。比如一个商业楼宇或者 IDC 机房里，半夜空调机组突然报警，系统提示“温度异常”。这个时候对一线运维人员来说，真正的问题不是“有没有看到告警”，而是他接下来要判断：是哪台设备、在哪个空间、影响哪些区域、以前有没有类似故障、应该先查哪个部件、要不要生成工单。但在传统流程里，这些信息是分散的。设备台账可能在一个系统，告警在一个系统，历史工单在另一个系统，SOP 可能还是文档，很多处理经验还在老师傅脑子里。所以客户真正缺的不是一个更漂亮的告警页面，而是一条从“看到告警”到“知道怎么处理”的工作流。我参与的 Inspector 就是在解决这个问题。它本质上是一个设施运维产品，帮助楼宇、园区或者 IDC 运维人员把设备、空间、告警、历史工单、SOP 和工单流程串起来。告警来了以后，系统先帮用户定位设备和空间，再补充历史记录和处理知识，然后给出可能原因、建议检查项和工单草稿，最后由人工确认后再派发。我在这个项目里主要做的，是把这个复杂流程拆成产品能落地的结构。比如我会先拆业务流：告警触发以后，用户需要经过设备定位、上下文补全、诊断建议、工单草稿、人工确认和结果回写。然后我会拆业务对象：设备、空间、告警、SOP、历史工单、知识源、工单字段和状态。AI 在这里不是一个单独的聊天框，而是放在这条业务链路里，辅助用户做诊断和建议生成。所以我也会和研发一起定义：AI 每一步拿什么输入、输出什么结构、哪些情况不能给确定结论、哪些高风险操作必须人工确认、工单草稿要包含哪些字段。这段经历对我来说，最重要的是我不是只做功能列表，而是把现场人员真实的工作过程拆成了产品流程，再把 AI 放到合适的位置，让它可用、可解释、可复核。这个能力我觉得和法律 AI 是相通的。比如合同审查也不是做一个聊天框，而是要把合同类型、交易背景、审查清单、法律依据、风险点、修改建议和人工复核串成一个可信的工作流。`,
          full: `我可以先用一个场景来讲这个项目。

比如一个商业楼宇或者 IDC 机房里，半夜空调机组突然报警，系统提示“温度异常”。这个时候对一线运维人员来说，真正的问题不是“有没有看到告警”，而是他接下来要判断：是哪台设备、在哪个空间、影响哪些区域、以前有没有类似故障、应该先查哪个部件、要不要生成工单。

但在传统流程里，这些信息是分散的。设备台账可能在一个系统，告警在一个系统，历史工单在另一个系统，SOP 可能还是文档，很多处理经验还在老师傅脑子里。所以客户真正缺的不是一个更漂亮的告警页面，而是一条从“看到告警”到“知道怎么处理”的工作流。

我参与的 Inspector 就是在解决这个问题。它本质上是一个设施运维产品，帮助楼宇、园区或者 IDC 运维人员把设备、空间、告警、历史工单、SOP 和工单流程串起来。告警来了以后，系统先帮用户定位设备和空间，再补充历史记录和处理知识，然后给出可能原因、建议检查项和工单草稿，最后由人工确认后再派发。

我在这个项目里主要做的，是把这个复杂流程拆成产品能落地的结构。比如我会先拆业务流：告警触发以后，用户需要经过设备定位、上下文补全、诊断建议、工单草稿、人工确认和结果回写。然后我会拆业务对象：设备、空间、告警、SOP、历史工单、知识源、工单字段和状态。

AI 在这里不是一个单独的聊天框，而是放在这条业务链路里，辅助用户做诊断和建议生成。所以我也会和研发一起定义：AI 每一步拿什么输入、输出什么结构、哪些情况不能给确定结论、哪些高风险操作必须人工确认、工单草稿要包含哪些字段。

这段经历对我来说，最重要的是我不是只做功能列表，而是把现场人员真实的工作过程拆成了产品流程，再把 AI 放到合适的位置，让它可用、可解释、可复核。这个能力我觉得和法律 AI 是相通的。比如合同审查也不是做一个聊天框，而是要把合同类型、交易背景、审查清单、法律依据、风险点、修改建议和人工复核串成一个可信的工作流。`,

        en: {
          question: "How would you explain Inspector in a simple way before going into AI technical details?",
          intent: ["Make the product understandable to non-domain interviewers", "Start from business pain instead of technical terms", "Show personal contribution and transferable skills"],
          simple: "I would start with a concrete scenario. Imagine a commercial building or IDC room triggers an air-conditioning alert at night. The operator does not only need to see the alert. They need to know which equipment it is, where it is, what area may be affected, whether similar issues happened before, what to check first, and whether a work order should be created. Traditionally, equipment records, alerts, historical work orders, SOPs, and expert experience are scattered. Inspector is a facility-operations product that connects equipment, space, alerts, SOPs, historical work orders, and the work-order process. My work was to turn that scattered process into a product workflow: alert, equipment location, context enrichment, diagnostic suggestion, work-order draft, human confirmation, and result writeback. AI is not a standalone chatbot here. It is embedded in the workflow to support diagnosis and draft generation. This is transferable to legal AI because contract review also needs trusted knowledge, user materials, structured outputs, and human review in one workflow.",
          full: `I would start with a concrete scenario. Imagine a commercial building or IDC room triggers an air-conditioning alert at night. For the operator, the real question is not just whether they can see the alert. They need to know which equipment it is, where it is, what area may be affected, whether similar issues happened before, what component to check first, and whether a work order should be created.

Traditionally, those pieces of information are scattered. Equipment records may be in one system, alerts in another, historical work orders somewhere else, SOPs in documents, and a lot of experience in senior technicians' heads. So the customer does not just need a nicer alert page. They need a workflow from seeing an alert to knowing how to handle it.

Inspector is a facility-operations product that solves this problem. It connects equipment, space, alerts, SOPs, historical work orders, and the work-order process. When an alert comes in, the system helps locate the equipment and space, adds historical records and handling knowledge, provides possible causes and suggested checks, then creates a work-order draft for human confirmation.

My role was to turn that complex process into a product structure. I broke down the business flow from alert triggering to equipment location, context enrichment, diagnostic suggestion, work-order draft, human confirmation, and result writeback. I also broke down business objects such as equipment, space, alerts, SOPs, historical work orders, knowledge sources, work-order fields, and states.

AI is not a standalone chatbot here. It is placed inside the workflow to support diagnosis and suggestion generation. That experience is transferable to legal AI, because contract review also needs contract type, transaction background, review checklist, legal basis, risk points, suggested edits, and human review in a trustworthy workflow.`,          notes: "Use this when the interviewer may not understand facility operations. Start with the night alert scenario, then explain the product and your contribution.",

          simple: "我主要讲 Inspector 设施运维 Agent 产品。S：它面向楼宇、园区和 IDC 机房场景，原本能做设备资产、空间定位、告警展示和工单流转，但客户真正的痛点是 BMS/IoT 告警、设备台账、SOP、历史工单和维修经验分散，一线人员看到异常后还要自己判断原因、找处理路径、再进入工单。T：我的目标不是做 AI 聊天框，而是把 AI 放进“告警到工单”的主流程，形成可验证、可兜底、可回写的诊断辅助闭环。A：我把流程拆成告警理解、上下文检索、诊断建议、处置方案、工单草稿、人工确认和结果回写；把对象拆成设备、空间、告警、知识源、工单字段和状态流；再和研发对齐输入字段、接口依赖、输出结构、异常路径和验收脚本。R：AI 部分我会诚实说还不是大规模全量上线，而是产品方案验证和 Demo/POC 阶段；但它已经从概念变成研发可评审、客户可理解、POC 可验证的产品方案，也支持 Inspector 从告警展示走向 AI 辅助诊断、工单闭环和知识沉淀。",
          full: "我最适合讲的是 Inspector 设施运维 Agent 产品。它本身是面向楼宇、园区、IDC 机房这类场景的设施运维产品，原本核心能力包括设备资产、空间定位、告警展示和工单流转。\n\nS - 背景和痛点：这个场景的问题不是没有数据，而是数据太分散。客户现场已经有 BMS/IoT 告警、设备台账、空间位置、SOP、历史工单和维修经验，但它们经常分散在不同系统或文档里。一线人员看到告警后，还要自己查设备、看历史记录、问专家、判断风险，再手动进入工单流程。所以痛点是：告警只能告诉用户“发生了什么”，但不能帮助用户快速判断“为什么发生、影响哪里、下一步怎么处理”。\n\nT - 我的任务：我的目标不是做一个独立 AI 聊天框，而是把 AI 放进“告警到处置”的主流程里，形成一个可验证、可兜底、可回写的诊断辅助闭环。同时，因为这是 B 端产品，还要能沉淀成可复用能力，支持售前演示、POC 和后续交付。\n\nA - 我的动作：我主要做了四件事。第一，我把业务流程拆成告警触发、告警理解、上下文检索、诊断建议、处置方案、工单草稿、人工确认和结果回写。第二，我把业务对象拆清楚，包括设备、空间、告警、SOP、历史工单、知识源、工单字段和状态流。第三，我定义 AI 部分的产品规则：AI 输出可能原因、依据、置信度、缺失信息和建议动作；低置信不强给结论，高风险设备必须人工确认。第四，我和研发对齐输入字段、接口依赖、输出结构、异常路径和场景验收脚本，让研发讨论的是协议和边界，而不是抽象地说“做个 Agent”。\n\nR - 结果和边界：这套方案把 AI 能力从概念变成了研发可评审、客户可理解、POC 可验证的产品方案。结果上，它支撑了 Inspector 从“告警展示 + 工单流转”走向“AI 辅助诊断 + 工单闭环 + 知识沉淀”的方向，也沉淀了数据准备、验收标准和交付材料。AI 部分我会诚实说还不是大规模全量上线，但它已经用于 Demo/POC 方案验证和客户沟通，并根据客户反馈持续收敛输出结构、兜底规则和场景范围。",

              full: "我会先把边界讲清楚：我定义的是产品侧 RAG 规则，不是算法实现细节。具体我会拆五件事。\n\n第一是知识源清单。先明确哪些内容应该进知识库，比如 SOP、设备资料、历史工单、告警说明、客户经验库；同时标清来源、负责人、更新时间、权限、适用设备类型和适用场景。这样后面检索错了，才能知道是知识缺失、版本问题，还是标签不够。\n\n第二是触发条件。不是所有问题都无脑检索。我会定义什么场景需要 RAG，比如某类设备告警、诊断建议、处置步骤生成或工单草稿生成；也会定义前置字段，比如设备 ID、告警码、空间位置、告警等级。如果关键字段缺失，产品上要先提示补信息，而不是让 AI 自由发挥。\n\n第三是检索结果怎么进入答案。我的要求不是只把材料塞给模型，而是让用户能看到依据：来源标题、知识类型、命中片段、匹配原因和更新时间。没有召回可靠依据时，输出里要提示依据不足，不能强行给确定结论。\n\n第四是输出结构。我会要求 AI 输出固定字段，比如可能原因、判断依据、置信度、缺失信息、建议检查项、风险提示和工单草稿字段。这样研发能做字段校验，测试也能写用例。\n\n第五是验收和 bad case。验收不是看答案顺不顺，而是看典型告警能不能召回正确 SOP，历史工单是否相关，引用内容是否支撑结论，输出字段是否完整，低置信或无依据时是否兜底。bad case 我也会拆成知识库缺内容、文档切分或标签不合理、检索召回不准、引用错配、输出结构不稳、流程缺少必要输入几类，再和研发分别处理。",

          full: "I would use Inspector, a facility operations Agent product.\n\nSituation: Inspector serves building, campus, and IDC facility operations. It already had capabilities around equipment assets, spatial location, alerts, and work-order flow. The real problem was not that customers lacked data. It was that BMS or IoT alerts, equipment records, SOPs, historical work orders, and maintenance knowledge were scattered across different systems and documents. Frontline operators could see that something happened, but still had to investigate why it happened, what it affected, and what to do next.\n\nTask: my goal was not to build a standalone AI chatbot. It was to embed AI into the alert-to-resolution workflow and create a diagnostic assistance loop that was verifiable, fallback-safe, and able to write results back into the workflow. Because it was a B2B product, it also needed to support pre-sales demos, POCs, and delivery.\n\nAction: I did four main things. First, I broke the workflow into alert triggering, alert understanding, context retrieval, diagnostic suggestions, action-plan generation, work-order draft, human confirmation, and result writeback. Second, I defined product objects such as equipment, space, alerts, SOPs, historical work orders, knowledge sources, work-order fields, and state flow. Third, I defined AI behavior rules: the output should include possible causes, evidence, confidence, missing information, and suggested actions; low-confidence cases should not force a conclusion, and high-risk equipment requires human confirmation. Fourth, I aligned with engineering on input fields, API dependencies, output structure, exception paths, and scenario-based acceptance scripts.\n\nResult: I would be clear that the AI part was not a full-scale production launch, and I did not train models. It was in product validation and Demo/POC design. But it turned AI from a vague idea into a product proposal that engineering could review, customers could understand, and POCs could validate.",

        zh: {
          question: "详细讲讲你在项目里怎么做 AI 应用：怎么拆业务流、定义 Agent、配合研发、验收和调优？",
          intent: ["证明真实做过 AI 产品化", "讲清业务流到研发协议", "展示用户反馈和 bad case 调优方法"],
          simple: `我做 Inspector 里 AI 应用时，一开始没有先想“做一个 Agent”，而是先看设施运维人员真实的一天。客户现场有告警、设备台账、工单系统、SOP 和历史维修记录，但这些信息是散的；系统能告诉你“温度异常”或“设备离线”，却不会告诉你为什么异常、过去有没有类似问题、该先查哪个部件、要不要生成工单。所以我把 AI 定义成嵌入“告警到工单”的业务闭环：告警触发后先识别设备和空间，再补设备台账、历史工单、SOP、时序数据等上下文，然后输出可能原因、依据、置信度、缺失信息和建议检查项，最后生成工单草稿，由人工确认后派发，执行结果再回写知识库。定义 Agent 时，我把它拆成告警理解、知识检索、诊断、方案生成、工单草稿几个职责，每个职责都定义输入、输出、触发时机和边界。跟研发配合时，我不会说“做个智能诊断”，而是把它拆成字段、接口、状态和验收脚本：设备 ID 能不能拿到，SOP 有没有结构化，历史工单有没有真实原因字段，AI 输出能不能按结构返回，低置信和没有依据时怎么兜底。验收上我不看回答是否漂亮，而看设备识别是否正确、依据是否召回、字段是否完整、低置信是否兜底、高风险是否人工确认。调优时，如果没有线上指标，我会看用户反馈和 bad case，把问题拆成知识缺失、检索不准、输出太泛、Schema 不稳、流程缺输入或风险边界不清，再分别补知识库、调检索、收紧输出结构、增加引用/置信度或加人工确认。`,
          full: `我做 Inspector 里 AI 应用的时候，其实一开始没有先想“我要做一个 Agent”。我当时先看的，是设施运维人员真实的一天。

客户现场已经有告警系统、设备台账、工单系统、SOP、历史维修记录，但问题是这些东西是散的。比如一个空调机组报警，系统能告诉你“温度异常”或者“设备离线”，但不会告诉你为什么异常、过去有没有类似问题、应该先查哪个部件、要不要派工单。一线人员还是要自己翻台账、问老师傅、查历史工单、看 SOP。于是我意识到，这个 AI 能力不能做成一个孤立聊天框，而应该嵌进“告警到工单”的业务主流程里。

我先把业务流拆成几步：告警触发以后，系统先识别告警对象是谁，在哪个空间，属于哪个设备系统；然后补上下文，包括设备台账、空间关系、历史工单、SOP、实时或历史数据；再让 AI 生成可能原因、判断依据、置信度、缺失信息和建议检查项；如果用户认可，再生成工单草稿；最后由人工确认、执行、回写结果，并把高价值案例沉淀回知识库。

所以我的第一步不是定义 Agent，而是定义业务闭环：告警 -> 上下文补全 -> 诊断建议 -> 处置方案 -> 工单草稿 -> 人工确认 -> 执行回写 -> 知识沉淀。

然后我再反过来拆 Agent。Agent 不是一个万能机器人，而是业务链路里不同职责的智能模块。告警理解 Agent 负责把原始告警转成结构化问题；RAG / 知识检索模块负责找 SOP、历史工单、设备资料；诊断 Agent 负责输出可能原因和依据；方案生成 Agent 负责给检查步骤；工单生成 Agent 只生成草稿，不自动派发。

我给每个 Agent 都定义四件事：输入是什么、输出是什么、什么时候触发、边界在哪里。比如诊断 Agent 的输入不是一句“帮我看看这个告警”，而是告警 ID、设备 ID、空间位置、告警等级、历史曲线、历史工单、SOP 检索结果。它的输出也不能是一句“可能是水阀问题”，而要包含可能原因、判断依据、置信度、缺失信息、建议动作和风险提示。

这也是我跟研发配合最核心的地方。我不会跟研发说“我们做个智能诊断吧”，这句话太虚了，研发也很难落地。我会把它拆成字段、接口、状态和验收脚本。比如设备 ID 能不能稳定拿到，SOP 有没有结构化，历史工单里有没有真实原因字段，AI 输出能不能按 JSON 或固定字段返回，低置信时怎么走分支，没有检索到 SOP 时能不能强制不生成确定结论。

当时我们也遇到过一个典型问题：大家很容易把 AI 想成“给一个完整答案”。但现场运维不是这样工作的。一线人员不一定需要 AI 直接告诉他“就是某个部件坏了”，他更需要的是：我应该先查什么，为什么先查这个，有没有历史类似案例，这个建议有多可靠，哪些地方还缺信息。所以我后来把输出从“结论型”调成“排查型 + 依据型”。

比如原来可能是：可能是冷却水阀异常，建议维修。这就太粗了。调优后我希望它变成：可能原因是冷却水阀异常；依据是当前温度异常与冷却水流量下降同时出现，历史工单中同区域出现过类似情况；置信度是中；缺失信息是现场阀门开度和管路压力；建议动作是先检查阀门开度、过滤器和管路压力，确认后再生成工单草稿。这样一线人员会更容易信任，因为它不是在替我决定，而是在帮我组织排查路径。

业务目标我也拆过。对客户来说，目标不是“用了 AI”，而是告警处理更快、经验能沉淀、新人也能按流程排查。对产品来说，目标是把一次性的客户方案沉淀成可复用能力。对研发来说，目标是先跑通一个最小闭环，而不是一口气覆盖所有设备、所有故障、所有 SOP。

所以我会把目标拆成三层。第一层是 MVP 闭环：选一个典型设备或告警类型，跑通“告警识别 - SOP/历史工单检索 - 建议输出 - 工单草稿”。第二层是可信机制：引用、置信度、缺失信息、人工确认。第三层才是规模化：更多设备类型、更多客户知识库、更多历史案例回流。

判断 AI 成果是否符合预期时，如果还没有稳定线上指标，我不会硬讲准确率。我会用场景验收来判断：一个典型告警来了以后，它有没有识别对设备，有没有召回正确 SOP，有没有引用历史工单，输出字段是不是完整，低置信时有没有兜底，高风险场景有没有要求人工确认，工单草稿能不能被运维人员少量修改后使用。

调优上，如果没有量化指标，我会主要看用户反馈和 bad case。我会把反馈拆成几类：输出太泛，说明可能要改成固定检查项和工单字段；依据不足，说明要补引用来源、知识源优先级和可解释展示；现场规则不匹配，说明要区分通用知识库和客户专属知识库；风险边界不清，说明高风险设备必须加人工确认或专家升级。

我指导研发调优时，也不会笼统说“模型不准”。我会先把 bad case 分类：是数据缺失、检索没召回、召回了但引用错、Prompt 越界、输出 Schema 不稳定，还是产品流程没有让用户补充必要信息。不同问题对应不同解法。知识缺失就补知识库；检索不准就调检索策略和标签；输出不稳定就收紧 Schema；用户不信任就增加引用和置信度；风险太高就加人工确认。

所以如果面试官问我这段经历，我不会说我训练了模型，也不会说 AI 已经完全替代人工。我会说，我做的是 AI 产品经理应该负责的那部分：把业务问题拆成流程，把流程拆成 Agent 职责，把 Agent 拆成输入输出和边界，再用场景验收、用户反馈和 bad case 迭代，让 AI 从一个概念变成研发能实现、客户能理解、现场敢用的产品闭环。`,

const $ = (id) => document.getElementById(id);
const t = (key) => labels[state.lang][key] || key;
const byId = new Map(data.questions.map((question) => [question.id, question]));

function localized(value) {
  if (value && typeof value === "object" && state.lang in value) return value[state.lang];
  return value;
}

function currentQuestion() {
  return byId.get(state.selectedId) || data.questions[0];
}

function getEdit(id = state.selectedId, lang = state.lang) {
  return state.edits[id]?.[lang] || {};
}

function mergedQuestion(id = state.selectedId) {
  const question = byId.get(id) || data.questions[0];
  const edit = getEdit(id, state.lang);
  return {
    ...question,
    localized: {
      ...question[state.lang],
      simple: edit.simple || question[state.lang].simple,
      full: edit.full || question[state.lang].full,
      notes: edit.notes || question[state.lang].notes,
    },
  };
}

function saveLocalEdits() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.edits));
}

function loadLocalEdits() {
  try {
    state.edits = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch {
    state.edits = {};
  }
}

async function loadFileEdits() {
  try {
    const response = await fetch(FILE_SYNC_URL, { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const payload = await response.json();
    if (payload.edits && typeof payload.edits === "object") {
      state.edits = { ...state.edits, ...payload.edits };
      saveLocalEdits();
      $("saveStatus").textContent = t("savedFile");
      return;
    }
  } catch {
    $("saveStatus").textContent = t("fileUnavailable");
  }
}

async function syncEditsToFile() {
  saveLocalEdits();
  try {
    const response = await fetch(FILE_SYNC_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ edits: state.edits }),
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    $("saveStatus").textContent = t("savedFile");
  } catch {
    $("saveStatus").textContent = t("savedBrowser");
  }
}

function filteredQuestions() {
  const search = $("sidebarQuestionSearch")?.value.trim().toLowerCase() || "";
  return data.questions.filter((question) => {
    const matchesMode = matchesQuestionMode(question, state.mode);
    const haystack = [
      question.zh.question,
      question.en.question,
      question.zh.simple,
      question.en.simple,
      question.category.zh,
      question.category.en,
      question.framework,
    ].join(" ").toLowerCase();
    return matchesMode && (!search || haystack.includes(search));
  });
}

function matchesQuestionMode(question, mode) {
  if (mode === "warmup") return question.mode.includes("warmup");
  return question.mode.includes(mode) || question.framework === mode;
}

function countForMode(mode) {
  return data.questions.filter((question) => matchesQuestionMode(question, mode.id)).length;
}

function setView(view) {
  state.view = view;
  document.querySelectorAll(".view-panel").forEach((panel) => {
    panel.classList.toggle("active", panel.dataset.view === view);
  });
  document.querySelectorAll("#viewNav button").forEach((button) => {
    button.classList.toggle("active", button.dataset.view === view);
  });
  $("resetBtn").hidden = view !== "practice";
  setPracticeSidebarVisible(view === "practice");
  $("pageTitle").textContent = localized(data.views.find((item) => item.id === view)) || view;
  $("pageKicker").textContent = view === "practice" ? data.meta.round : data.meta.company;
  if (view === "review") renderReview();
  if (view === "company") renderCompany();
  if (view === "map") renderMap();
}

function setPracticeSidebarVisible(isPractice) {
  $("modeFilterPanel").hidden = !isPractice;
  $("questionNavPanel").hidden = !isPractice;
  $("quickPanel").hidden = !isPractice;
}

function renderMeta() {
  $("roundLabel").textContent = data.meta.round;
  $("companyName").textContent = data.meta.company;
  $("roleName").textContent = data.meta.role;
  $("modeLabel").textContent = t("mode");
  $("randomBtn").textContent = t("random");
  $("coreLineTitle").textContent = t("coreTitle");
  $("coreLine").textContent = localized(data.meta.coreLine);
  $("speakCoreBtn").textContent = t("speak");
  $("exportBtn").textContent = t("export");
  $("importBtn").textContent = t("import");
  $("resetBtn").textContent = t("reset");
  $("boundaryText").innerHTML = `<strong>${t("boundaryPrefix")}:</strong> ${escapeHtml(localized(data.meta.boundary))}`;
  $("builderTitle").textContent = t("builder");
  $("simpleLabel").textContent = t("simpleLabel");
  $("fullLabel").textContent = t("fullLabel");
  $("notesLabel").textContent = t("notesLabel");
  $("saveEditBtn").textContent = t("save");
  $("copySimpleBtn").textContent = t("copy");
  $("questionListTitle").textContent = t("questionList");
  $("sidebarQuestionSearch").placeholder = t("questionSearch");
  $("reviewTitle").textContent = t("reviewTitle");
  $("reviewSubtitle").textContent = t("reviewSubtitle");
  $("reviewSearchInput").placeholder = t("reviewSearch");
  $("companyTitle").textContent = t("companyTitle");
  $("companySubtitle").textContent = t("companySubtitle");
  $("companySearchInput").placeholder = t("companySearch");
  $("mapTitle").textContent = t("mapTitle");
  $("mapSubtitle").textContent = t("mapSubtitle");
  $("importTitle").textContent = t("importTitle");
  $("cancelImportBtn").textContent = t("cancel");
  $("confirmImportBtn").textContent = t("import");
  $("shadowTitle").textContent = t("shadow");
  $("speakAnswerBtn").textContent = t("speakAnswer");
  document.documentElement.lang = state.lang === "zh" ? "zh-CN" : "en";
}

function renderViewNav() {
  $("viewNav").innerHTML = "";
  for (const view of data.views) {
    const button = document.createElement("button");
    button.type = "button";
    button.dataset.view = view.id;
    button.textContent = localized(view);
    button.className = view.id === state.view ? "active" : "";
    button.addEventListener("click", () => setView(view.id));
    $("viewNav").appendChild(button);
  }
}

function renderModeOptions() {
  $("modeSelect").innerHTML = "";
  for (const mode of data.modes) {
    const option = document.createElement("option");
    option.value = mode.id;
    option.textContent = `${localized(mode)} (${countForMode(mode)})`;
    option.selected = mode.id === state.mode;
    $("modeSelect").appendChild(option);
  }
}

function renderTabs() {
  const tabNames = ["intent", "simple", "full", "followups"];
  $("answerTabs").innerHTML = "";
  for (const tab of tabNames) {
    const button = document.createElement("button");
    button.type = "button";
    button.dataset.tab = tab;
    button.className = `tab${state.tab === tab ? " active" : ""}`;
    button.textContent = t(tab);
    button.addEventListener("click", () => {
      state.tab = tab;
      renderQuestion();
    });
    $("answerTabs").appendChild(button);
  }
}

function renderQuestion() {
  const question = mergedQuestion();
  const item = question.localized;
  $("categoryPill").textContent = localized(question.category);
  $("difficultyPill").textContent = localized(question.difficulty);
  $("questionText").textContent = item.question;
  $("questionIntent").textContent = item.intent.join(" / ");
  $("editableSimple").value = item.simple;
  $("editableFull").value = item.full;
  $("editableNotes").value = item.notes;

  if (state.tab === "intent") {
    $("tabContent").innerHTML = renderIntentPoints(item.intent, item);
  } else if (state.tab === "followups") {
    $("tabContent").innerHTML = renderFollowups(item.followups);
  } else {
    $("tabContent").textContent = item[state.tab];
  }

  const shadowSource = state.tab === "full" ? item.full : item.simple;
  $("shadowLines").innerHTML = splitLines(shadowSource)
    .map((line) => `<li>${escapeHtml(line)}</li>`)
    .join("");
}

function renderIntentPoints(points, item) {
  const evidence = buildIntentEvidence(item, points);
  const answerHook = buildAnswerHook(item);
  return `
    <div class="intent-board">
      <div class="intent-board-head">
        <span>${t("intentBoardKicker")}</span>
        <strong>${t("intentBoardTitle")}</strong>
        <p>${t("intentBoardSubtitle")}</p>
      </div>
      <div class="intent-rubric-list">
        ${points.map((point, index) => `
          <div class="intent-rubric-card">
            <span class="intent-index">${String(index + 1).padStart(2, "0")}</span>
            <div class="intent-rubric-copy">
              <strong class="intent-card-title">${t("intentCardTitle")}</strong>
              <p>${escapeHtml(point)}</p>
            </div>
            <div class="intent-signal">
              <strong>${t("intentEvidenceTitle")}</strong>
              <span>${escapeHtml(evidence[index])}</span>
            </div>
          </div>
        `).join("")}
      </div>
      <div class="intent-cue">
        <strong>${t("intentCueTitle")}</strong>
        <span class="intent-hook-steps">${escapeHtml(answerHook)}</span>
      </div>
    </div>
  `;
}

function buildIntentEvidence(item, points) {
  const sentences = splitEvidenceSentences(item.simple || item.full || "");
  return points.map((_, index) => {
    return sentences[index] || sentences[sentences.length - 1] || item.notes || t("intentEvidenceFallback");
  });
}

function buildAnswerHook(item) {
  const [opening] = splitEvidenceSentences(item.simple || item.full || item.question || "");
  if (!opening) return t("intentCueBody");
  return `${t("intentCueBody")}: ${opening}`;
}

function splitEvidenceSentences(text) {
  const compactText = String(text)
    .replace(/\n+/g, " ")
    .replace(/\s+/g, " ")
    .trim();
  if (!compactText) return [];
  return (compactText.match(/[^。！？.!?]+[。！？.!?]?/g) || [])
    .map((line) => line.trim())
    .filter(Boolean)
    .slice(0, 4);
}

function renderFollowups(followups) {
  return `
    <div class="followup-list">
      ${followups.map((followup, index) => `
        <details class="followup-card"${index === 0 ? " open" : ""}>
          <summary>${escapeHtml(followup.question)}</summary>
          <div class="followup-body">
            <div>
              <strong>${t("followupIntent")}</strong>
              <p>${escapeHtml(followup.intent)}</p>
            </div>
            <div>
              <strong>${t("followupSimple")}</strong>
              <p>${escapeHtml(followup.simple)}</p>
            </div>
            ${followup.full ? `
              <div>
                <strong>${t("followupFull")}</strong>
                <p>${escapeHtml(followup.full)}</p>
              </div>
            ` : ""}
          </div>
        </details>
      `).join("")}
    </div>
  `;
}

function renderQuestionList() {
  const questions = filteredQuestions();
  $("sidebarQuestionList").innerHTML = "";
  if (!questions.length) {
    $("sidebarQuestionList").innerHTML = `<div class="sidebar-question-empty">${t("noResult")}</div>`;
    return;
  }
  const selectedIndex = questions.findIndex((question) => question.id === state.selectedId);
  for (const question of questions) {
    const button = document.createElement("button");
    button.type = "button";
    button.className = `sidebar-question-item${question.id === state.selectedId ? " active" : ""}`;
    button.innerHTML = `
      <div class="item-title">${escapeHtml(question[state.lang].question)}</div>
      <div class="item-meta">${escapeHtml(localized(question.category))} · ${escapeHtml(localized(question.difficulty))}</div>
    `;
    button.addEventListener("click", () => {
      state.selectedId = question.id;
      renderPractice();
    });
    $("sidebarQuestionList").appendChild(button);
  }
  if (selectedIndex >= 0) {
    $("questionListTitle").textContent = `${t("questionList")} ${selectedIndex + 1}/${questions.length}`;
  } else {
    $("questionListTitle").textContent = `${t("questionList")} 0/${questions.length}`;
  }
}

function renderPractice() {
  renderTabs();
  renderModeOptions();
  if (!filteredQuestions().some((question) => question.id === state.selectedId)) {
    state.selectedId = filteredQuestions()[0]?.id || data.questions[0].id;
  }
  renderQuestion();
  renderQuestionList();
}

function renderReview() {
  const search = $("reviewSearchInput").value.trim().toLowerCase();
  const matches = (text) => !search || text.toLowerCase().includes(search);
  const focusItems = data.reviewFocus.filter((item) => matches(localized(item)));
  $("reviewFocusList").innerHTML = focusItems.map((item) => `
    <div class="review-item">
      <strong>${escapeHtml(localized(item))}</strong>
      <button type="button" class="phrase-chip" data-speak="${escapeHtml(localized(item))}">${t("speak")}</button>
    </div>
  `).join("") || `<div class="review-item">${t("noResult")}</div>`;

  $("frameworkList").innerHTML = data.questionFrameworks.map((framework) => `
    <div class="framework-item">
      <strong>${escapeHtml(localized(framework))}</strong>
      <span>${escapeHtml(localized(framework.guide))}</span>
    </div>
  `).join("");

  $("phraseBank").innerHTML = data.phraseBank.map((group) => `
    <div class="phrase-group">
      <strong>${escapeHtml(localized(group.title))}</strong>
      <div class="phrase-chips">
        ${group.items.map((item) => {
          const text = localized(item);
          return `<button type="button" class="phrase-chip" data-copy="${escapeHtml(text)}">${escapeHtml(text)}</button>`;
        }).join("")}
      </div>
    </div>
  `).join("");
}

function renderCompany() {
  const research = data.companyResearch;
  const search = $("companySearchInput").value.trim().toLowerCase();
  const matches = (text) => !search || text.toLowerCase().includes(search);
  $("sourceStrip").innerHTML = `
    <div class="source-item">
      <strong>${t("sourceDate")}: ${escapeHtml(research.researchedAt)}</strong>
      <p>${escapeHtml(localized(research.factBoundary))}</p>
    </div>
    <div class="source-item">
      <strong>${t("sources")}</strong>
      ${research.sources.map((source) => `<p><a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">${escapeHtml(source.label)}</a> · ${escapeHtml(source.accessedAt)}</p>`).join("")}
    </div>
  `;
  const cards = research.cards.filter((card) => {
    const haystack = [localized(card.title), localized(card.body), localized(card.interviewUse)].join(" ").toLowerCase();
    return matches(haystack);
  });
  $("companyCards").innerHTML = cards.map((card) => `
    <article class="company-item">
      <strong>${escapeHtml(localized(card.title))}</strong>
      <p>${escapeHtml(localized(card.body))}</p>
      <p><b>${t("interviewUse")}:</b> ${escapeHtml(localized(card.interviewUse))}</p>
    </article>
  `).join("") || `<div class="company-item">${t("noResult")}</div>`;
}

function renderMap() {
  $("questionMap").innerHTML = data.questionFrameworks.map((framework) => {
    const questions = data.questions.filter((question) => question.framework === framework.id);
    return `
      <section class="map-group">
        <strong>${escapeHtml(localized(framework))}</strong>
        <p>${escapeHtml(localized(framework.guide))}</p>
        <div class="question-list">
          ${questions.map((question) => `
            <button type="button" class="list-item" data-question="${escapeHtml(question.id)}">
              <div class="item-title">${escapeHtml(question[state.lang].question)}</div>
              <div class="item-meta">${escapeHtml(localized(question.category))}</div>
            </button>
          `).join("")}
        </div>
      </section>
    `;
  }).join("");
}

function renderAll() {
  renderMeta();
  renderViewNav();
  renderModeOptions();
  renderPractice();
  setView(state.view);
}

function splitLines(text) {
  return String(text)
    .split(/\n+/)
    .map((line) => line.trim())
    .filter(Boolean)
    .slice(0, 6);
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function updateCurrentEdit() {
  const id = state.selectedId;
  state.edits[id] = state.edits[id] || {};
  state.edits[id][state.lang] = {
    simple: $("editableSimple").value,
    full: $("editableFull").value,
    notes: $("editableNotes").value,
  };
}

function copyText(text) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text);
  } else {
    const area = document.createElement("textarea");
    area.value = text;
    document.body.appendChild(area);
    area.select();
    document.execCommand("copy");
    area.remove();
  }
  $("saveStatus").textContent = t("copied");
}

function speak(text) {
  if (!window.speechSynthesis || !text) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = state.lang === "zh" ? "zh-CN" : "en-US";
  window.speechSynthesis.speak(utterance);
}

function startTimer(seconds) {
  clearInterval(state.timer);
  state.timerRemaining = seconds;
  updateTimerDisplay();
  state.timer = setInterval(() => {
    state.timerRemaining -= 1;
    updateTimerDisplay();
    if (state.timerRemaining <= 0) clearInterval(state.timer);
  }, 1000);
}

function updateTimerDisplay() {
  const minutes = Math.floor(state.timerRemaining / 60);
  const seconds = state.timerRemaining % 60;
  $("timerDisplay").textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

function exportEdits() {
  const payload = {
    exportedAt: new Date().toISOString(),
    meta: data.meta,
    edits: state.edits,
  };
  const blob = new Blob([`${JSON.stringify(payload, null, 2)}\n`], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "interview-prep-edits.json";
  link.click();
  URL.revokeObjectURL(url);
}

function importEdits() {
  try {
    const payload = JSON.parse($("importText").value);
    if (!payload.edits || typeof payload.edits !== "object") throw new Error("Missing edits");
    state.edits = { ...state.edits, ...payload.edits };
    saveLocalEdits();
    $("importDialog").close();
    $("saveStatus").textContent = t("imported");
    renderAll();
  } catch (error) {
    $("saveStatus").textContent = error.message;
  }
}

function bindEvents() {
  $("languageSwitch").addEventListener("click", (event) => {
    const button = event.target.closest("button[data-lang]");
    if (!button) return;
    state.lang = button.dataset.lang;
    document.querySelectorAll("#languageSwitch button").forEach((item) => {
      item.classList.toggle("active", item.dataset.lang === state.lang);
    });
    renderAll();
  });

  $("randomBtn").addEventListener("click", () => {
    const questions = filteredQuestions();
    const next = questions[Math.floor(Math.random() * questions.length)];
    if (next) {
      state.selectedId = next.id;
      renderPractice();
    }
  });

  $("modeSelect").addEventListener("change", () => {
    state.mode = $("modeSelect").value;
    renderPractice();
  });

  $("sidebarQuestionSearch").addEventListener("input", renderQuestionList);
  $("reviewSearchInput").addEventListener("input", renderReview);
  $("companySearchInput").addEventListener("input", renderCompany);

  $("saveEditBtn").addEventListener("click", () => {
    updateCurrentEdit();
    syncEditsToFile();
    renderPractice();
  });

  $("resetBtn").addEventListener("click", () => {
    if (state.edits[state.selectedId]) {
      delete state.edits[state.selectedId][state.lang];
      if (!Object.keys(state.edits[state.selectedId]).length) delete state.edits[state.selectedId];
      saveLocalEdits();
      renderPractice();
    }
  });

  $("copySimpleBtn").addEventListener("click", () => {
    copyText($("editableSimple").value);
  });

  $("speakCoreBtn").addEventListener("click", () => speak(localized(data.meta.coreLine)));
  $("speakAnswerBtn").addEventListener("click", () => {
    const item = mergedQuestion().localized;
    speak(state.tab === "full" ? item.full : item.simple);
  });

  $("timer60").addEventListener("click", () => startTimer(60));
  $("timer90").addEventListener("click", () => startTimer(90));
  $("timer120").addEventListener("click", () => startTimer(120));
  $("stopTimer").addEventListener("click", () => {
    clearInterval(state.timer);
    state.timerRemaining = 0;
    updateTimerDisplay();
  });

  $("exportBtn").addEventListener("click", exportEdits);
  $("importBtn").addEventListener("click", () => $("importDialog").showModal());
  $("confirmImportBtn").addEventListener("click", importEdits);

  document.addEventListener("click", (event) => {
    const speakButton = event.target.closest("[data-speak]");
    if (speakButton) speak(speakButton.dataset.speak);
    const copyButton = event.target.closest("[data-copy]");
    if (copyButton) copyText(copyButton.dataset.copy);
    const mapQuestion = event.target.closest("[data-question]");
    if (mapQuestion) {
      state.selectedId = mapQuestion.dataset.question;
      setView("practice");
      renderPractice();
    }
  });

  window.addEventListener("beforeunload", () => window.speechSynthesis?.cancel());
}

loadLocalEdits();
bindEvents();
renderAll();
loadFileEdits();

</script>
</body>
</html>
